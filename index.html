<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TMO Label Detector</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#000;
  color:#fff;
  font-family:'Segoe UI', system-ui, sans-serif;
  height:100dvh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── FULL SCREEN CAMERA ── */
#video {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* ── OVERLAY LAYER ── */
#overlay {
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

/* ── SCAN BOX ── */
.scan-box {
  width:82vw;
  max-width:340px;
  aspect-ratio:2.2/1;
  position:relative;
}

.corner {
  position:absolute;
  width:22px;
  height:22px;
  border-color:#fff;
  border-style:solid;
  opacity:0.85;
}
.corner.tl { top:0; left:0; border-width:3px 0 0 3px; border-radius:5px 0 0 0; }
.corner.tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 5px 0 0; }
.corner.bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 5px; }
.corner.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 5px 0; }

.scan-border {
  position:absolute;
  inset:0;
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:8px;
}

.scan-line {
  position:absolute;
  left:8px; right:8px;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.7),transparent);
  animation:scanMove 2s ease-in-out infinite;
  top:8px;
  border-radius:1px;
}

@keyframes scanMove {
  0%   { top:8px; opacity:0; }
  15%  { opacity:1; }
  85%  { opacity:1; }
  100% { top:calc(100% - 10px); opacity:0; }
}

/* Hint text below scan box */
.scan-hint {
  margin-top:12px;
  font-size:12px;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.4px;
  background:rgba(0,0,0,0.45);
  padding:5px 14px;
  border-radius:20px;
  backdrop-filter:blur(4px);
}

/* ── RESULT PILL (bottom of screen) ── */
#resultPill {
  position:fixed;
  bottom:0;
  left:0; right:0;
  z-index:20;
  padding:0 16px 20px;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}

.pill-status {
  border-radius:16px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.12);
  transition:background 0.3s, border-color 0.3s;
}

.pill-status.idle    { background:rgba(20,20,30,0.78); }
.pill-status.ok      { background:rgba(22,163,74,0.82); border-color:rgba(74,222,128,0.3); }
.pill-status.ng      { background:rgba(185,28,28,0.82); border-color:rgba(248,113,113,0.3); }
.pill-status.loading { background:rgba(20,20,30,0.78); }

.pill-icon { font-size:26px; flex-shrink:0; }

.pill-text { flex:1; }
.pill-title { font-size:16px; font-weight:700; letter-spacing:-0.2px; line-height:1.2; }
.pill-sub   { font-size:12px; opacity:0.8; margin-top:2px; line-height:1.4; }

/* Checklist row inside pill */
.check-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:6px;
}

.check-chip {
  font-size:11px;
  font-weight:600;
  padding:3px 9px;
  border-radius:20px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
}

.check-chip.pass { background:rgba(74,222,128,0.2); border-color:rgba(74,222,128,0.4); color:#bbf7d0; }
.check-chip.fail { background:rgba(248,113,113,0.2); border-color:rgba(248,113,113,0.4); color:#fecaca; }

/* ── TOP BAR ── */
#topBar {
  position:fixed;
  top:0; left:0; right:0;
  z-index:20;
  padding:12px 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  pointer-events:none;
}

.top-title { font-size:15px; font-weight:700; letter-spacing:0.2px; }
.top-sub   { font-size:10px; opacity:0.65; margin-top:1px; }

/* Top-right controls */
.top-controls { display:flex; gap:8px; pointer-events:all; }

.ctrl-btn {
  width:36px; height:36px;
  border-radius:50%;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
  transition:background 0.2s;
}
.ctrl-btn:active { transform:scale(0.93); }
.ctrl-btn.active { background:rgba(99,102,241,0.7); border-color:rgba(99,102,241,0.5); }

/* ── SCANNING INDICATOR ── */
#scanIndicator {
  position:fixed;
  top:60px; left:50%; transform:translateX(-50%);
  z-index:20;
  font-size:11px;
  color:rgba(255,255,255,0.6);
  background:rgba(0,0,0,0.4);
  padding:4px 12px;
  border-radius:20px;
  backdrop-filter:blur(4px);
  pointer-events:none;
  transition:opacity 0.3s;
  white-space:nowrap;
}

/* ── HISTORY DRAWER ── */
#historyDrawer {
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:30;
  background:rgba(10,10,18,0.97);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(255,255,255,0.1);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height:55vh;
  overflow-y:auto;
  padding:16px 16px 32px;
}
#historyDrawer.open { transform:translateY(0); }

.drawer-handle {
  width:36px; height:4px;
  background:rgba(255,255,255,0.2);
  border-radius:2px;
  margin:0 auto 14px;
}

.drawer-title {
  font-size:13px; font-weight:600;
  letter-spacing:0.8px;
  color:rgba(255,255,255,0.5);
  text-transform:uppercase;
  margin-bottom:12px;
}

.h-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:13px;
}
.h-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-ok { background:#22c55e; }
.dot-ng { background:#ef4444; }
.h-label { flex:1; font-weight:500; }
.h-time { font-size:11px; color:rgba(255,255,255,0.4); }

/* ── CANVAS (hidden) ── */
#canvas { display:none; }

/* ── COOLDOWN RING around scan box ── */
.cooldown-ring {
  position:absolute;
  inset:-6px;
  border-radius:12px;
  border:2px solid transparent;
  transition:border-color 0.2s;
}
.cooldown-ring.scanning { border-color:rgba(99,102,241,0.6); animation:ringPulse 1s ease-in-out infinite; }
.cooldown-ring.ok       { border-color:rgba(74,222,128,0.8); }
.cooldown-ring.ng       { border-color:rgba(248,113,113,0.6); }

@keyframes ringPulse {
  0%,100% { opacity:0.5; }
  50%     { opacity:1; }
}

/* Overlay tint on result */
#bgTint {
  position:fixed;
  inset:0;
  z-index:5;
  pointer-events:none;
  transition:background 0.4s;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="bgTint"></div>

<!-- TOP BAR -->
<div id="topBar">
  <div>
    <div class="top-title">TMO Label Detector</div>
    <div class="top-sub">QC: 15W-40 · CI-4 · DIESEL</div>
  </div>
  <div class="top-controls">
    <button class="ctrl-btn" id="btnTorch" title="Flash">🔦</button>
    <button class="ctrl-btn" id="btnSwitch" title="Flip camera">🔄</button>
    <button class="ctrl-btn" id="btnHistory" title="History">📋</button>
  </div>
</div>

<!-- SCAN INDICATOR -->
<div id="scanIndicator">Memulai kamera…</div>

<!-- CAMERA OVERLAY -->
<div id="overlay">
  <div class="scan-box" id="scanBox">
    <div class="scan-border"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>
    <div class="cooldown-ring" id="cooldownRing"></div>
  </div>
  <div class="scan-hint" id="scanHint">Arahkan label ke kotak scan</div>
</div>

<!-- RESULT PILL -->
<div id="resultPill">
  <div class="pill-status idle" id="pillStatus">
    <div class="pill-icon" id="pillIcon">🔍</div>
    <div class="pill-text">
      <div class="pill-title" id="pillTitle">Menunggu label…</div>
      <div class="pill-sub" id="pillSub">Arahkan kamera ke label TMO</div>
    </div>
  </div>
</div>

<!-- HISTORY DRAWER -->
<div id="historyDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Riwayat Scan</div>
  <div id="historyList"><p style="color:rgba(255,255,255,0.3);font-size:13px;">Belum ada riwayat.</p></div>
</div>

<script>
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const overlay     = document.getElementById('overlay');
const bgTint      = document.getElementById('bgTint');
const scanLine    = document.getElementById('scanLine');
const scanHint    = document.getElementById('scanHint');
const coolRing    = document.getElementById('cooldownRing');
const scanInd     = document.getElementById('scanIndicator');
const pillStatus  = document.getElementById('pillStatus');
const pillIcon    = document.getElementById('pillIcon');
const pillTitle   = document.getElementById('pillTitle');
const pillSub     = document.getElementById('pillSub');
const historyList = document.getElementById('historyList');
const historyDrawer = document.getElementById('historyDrawer');
const btnTorch    = document.getElementById('btnTorch');
const btnSwitch   = document.getElementById('btnSwitch');
const btnHistory  = document.getElementById('btnHistory');

let stream = null;
let facingMode = 'environment';
let torchTrack = null;
let torchOn = false;
let isAnalyzing = false;
let scanInterval = null;
let history = [];
let lastStatus = 'idle'; // idle | ok | ng

const SCAN_INTERVAL_MS = 2500; // scan every 2.5s

// ── CAMERA ──
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    torchOn = false;
    torchTrack = null;
    btnTorch.classList.remove('active');
    btnTorch.textContent = '🔦';

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      }
    });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));

    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.torch) {
      torchTrack = track;
      btnTorch.style.display = 'flex';
    } else {
      btnTorch.style.display = 'none';
    }

    setScanIndicator('Siap — mendeteksi…');
    startRealTimeScan();
  } catch (e) {
    setScanIndicator('❌ Kamera gagal dibuka');
    setPill('idle', '⚠️', 'Kamera tidak bisa dibuka', 'Pastikan izin kamera sudah diberikan', null);
  }
}

// ── TORCH ──
btnTorch.addEventListener('click', async () => {
  if (!torchTrack) return;
  torchOn = !torchOn;
  try {
    await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    btnTorch.classList.toggle('active', torchOn);
    btnTorch.textContent = torchOn ? '💡' : '🔦';
  } catch { torchOn = false; btnTorch.classList.remove('active'); }
});

// ── FLIP ──
btnSwitch.addEventListener('click', () => {
  stopRealTimeScan();
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

// ── HISTORY ──
btnHistory.addEventListener('click', () => {
  historyDrawer.classList.toggle('open');
});
historyDrawer.addEventListener('click', e => {
  if (e.target === historyDrawer) historyDrawer.classList.remove('open');
});

// ── IMAGE PREPROCESSING ──
function preprocessFrame() {
  const vw = video.videoWidth  || 640;
  const vh = video.videoHeight || 480;

  // Crop center region (where scan box is)
  const cropX = Math.floor(vw * 0.06);
  const cropY = Math.floor(vh * 0.18);
  const cropW = Math.floor(vw * 0.88);
  const cropH = Math.floor(vh * 0.64);

  const outW = 1280;
  const outH = Math.floor((cropH / cropW) * outW);

  canvas.width  = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');

  // Draw upscaled crop
  ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, outW, outH);

  // Contrast + brightness boost
  const imgData = ctx.getImageData(0, 0, outW, outH);
  const d = imgData.data;
  const contrast = 1.45;
  const brightness = 12;

  // First pass: contrast/brightness
  const src = new Uint8ClampedArray(d.length);
  for (let i = 0; i < d.length; i += 4) {
    src[i]   = Math.min(255, Math.max(0, (d[i]   - 128) * contrast + 128 + brightness));
    src[i+1] = Math.min(255, Math.max(0, (d[i+1] - 128) * contrast + 128 + brightness));
    src[i+2] = Math.min(255, Math.max(0, (d[i+2] - 128) * contrast + 128 + brightness));
    src[i+3] = d[i+3];
  }

  // Sharpen kernel
  const kernel = [0,-1,0,-1,5,-1,0,-1,0];
  for (let y = 1; y < outH-1; y++) {
    for (let x = 1; x < outW-1; x++) {
      for (let c = 0; c < 3; c++) {
        let v = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            v += src[((y+ky)*outW+(x+kx))*4+c] * kernel[(ky+1)*3+(kx+1)];
          }
        }
        d[(y*outW+x)*4+c] = Math.min(255, Math.max(0, v));
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  return canvas.toDataURL('image/jpeg', 0.88).split(',')[1];
}

// ── CLAUDE API ──
async function analyzeFrame(base64) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 512,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text: `Kamu adalah sistem QC real-time untuk oli TMO Lubricant.

Produk TARGET yang dinyatakan OK:
- Brand: TMO Lubricant
- Grade: 15W-40
- Spec API: CI-4 (atau CI4)
- Tipe: DIESEL

Gambar ini adalah crop area tengah frame kamera yang sudah di-sharpen dan contrast-boost.

Tugas: periksa apakah gambar menunjukkan label produk TMO yang memenuhi KETIGA kriteria di atas.

Kembalikan HANYA JSON (tanpa teks lain):
{
  "status": "OK" | "NG" | "NO_LABEL",
  "grade": "<terbaca atau ?>",
  "spec": "<terbaca atau ?>",
  "type": "<terbaca atau ?>",
  "confidence": "HIGH" | "MEDIUM" | "LOW",
  "note": "<max 6 kata alasan jika NG/NO_LABEL>"
}

Aturan:
- NO_LABEL: tidak ada label TMO terlihat sama sekali di frame
- NG: label TMO terlihat tapi tidak memenuhi semua kriteria
- OK: label TMO terlihat DAN grade=15W-40 DAN spec=CI-4 DAN type=DIESEL
- CI4 tanpa strip = CI-4, keduanya valid
- Jika tulisan agak buram tapi konteks jelas (label TMO, ada angka viskositas), tetap baca`
          }
        ]
      }]
    })
  });

  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  const raw = data.content.map(i => i.text || '').join('').trim();
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// ── REAL TIME SCAN LOOP ──
function startRealTimeScan() {
  stopRealTimeScan();
  // First scan immediately after short delay
  setTimeout(doScan, 1200);
  scanInterval = setInterval(doScan, SCAN_INTERVAL_MS);
}

function stopRealTimeScan() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
}

async function doScan() {
  if (isAnalyzing || !video.readyState || video.readyState < 2) return;
  isAnalyzing = true;
  coolRing.className = 'cooldown-ring scanning';
  setScanIndicator('Menganalisis…');

  try {
    const base64 = preprocessFrame();
    const result = await analyzeFrame(base64);
    handleResult(result);
  } catch (e) {
    // Silent fail — just keep scanning
    setScanIndicator('Siap — mendeteksi…');
    coolRing.className = 'cooldown-ring';
  } finally {
    isAnalyzing = false;
  }
}

// ── HANDLE RESULT ──
function handleResult(r) {
  if (r.status === 'NO_LABEL') {
    coolRing.className = 'cooldown-ring';
    bgTint.style.background = 'transparent';
    setScanIndicator('Belum ada label — arahkan kamera');
    if (lastStatus !== 'idle') {
      setPill('idle', '🔍', 'Menunggu label…', 'Arahkan kamera ke label TMO', null);
      lastStatus = 'idle';
    }
    return;
  }

  const gradeOK = r.grade === '15W-40';
  const specOK  = r.spec === 'CI-4' || r.spec === 'CI4';
  const typeOK  = r.type === 'DIESEL';
  const isOK    = r.status === 'OK' && gradeOK && specOK && typeOK;

  const chips = [
    { label: `${gradeOK?'✓':'✗'} ${r.grade||'?'}`, ok: gradeOK },
    { label: `${specOK?'✓':'✗'} ${r.spec||'?'}`,  ok: specOK  },
    { label: `${typeOK?'✓':'✗'} ${r.type||'?'}`,  ok: typeOK  },
  ];

  if (isOK) {
    coolRing.className = 'cooldown-ring ok';
    bgTint.style.background = 'rgba(22,163,74,0.12)';
    setScanIndicator('✓ Label terdeteksi');
    if (lastStatus !== 'ok') {
      setPill('ok', '✅', 'Produk OK', '15W-40 · CI-4 · DIESEL sesuai', chips);
      addHistory('OK', r);
      lastStatus = 'ok';
    }
  } else {
    coolRing.className = 'cooldown-ring ng';
    bgTint.style.background = 'rgba(185,28,28,0.1)';
    const reason = r.note || 'Spesifikasi tidak sesuai';
    setScanIndicator('✗ ' + reason);
    if (lastStatus !== 'ng') {
      setPill('ng', '❌', 'Produk NG', reason, chips);
      addHistory('NG', r);
      lastStatus = 'ng';
    }
  }
}

// ── UI HELPERS ──
function setPill(state, icon, title, sub, chips) {
  pillStatus.className = 'pill-status ' + state;
  pillIcon.textContent = icon;
  pillTitle.textContent = title;
  pillSub.textContent = sub;

  // Remove old check row
  const old = pillStatus.querySelector('.check-row');
  if (old) old.remove();

  if (chips) {
    const row = document.createElement('div');
    row.className = 'check-row';
    chips.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'check-chip ' + (c.ok ? 'pass' : 'fail');
      chip.textContent = c.label;
      row.appendChild(chip);
    });
    pillStatus.querySelector('.pill-text').appendChild(row);
  }
}

function setScanIndicator(text) {
  scanInd.textContent = text;
}

function addHistory(status, r) {
  const now = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  history.unshift({ status, r, time: now });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  if (!history.length) {
    historyList.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px;">Belum ada riwayat.</p>';
    return;
  }
  historyList.innerHTML = history.map(h => {
    const label = h.status === 'OK'
      ? '15W-40 · CI-4 · DIESEL'
      : `${h.r.grade||'?'} · ${h.r.spec||'?'} · ${h.r.type||'?'}`;
    return `<div class="h-item">
      <div class="h-dot dot-${h.status.toLowerCase()}"></div>
      <span class="h-label">${h.status} — ${label}</span>
      <span class="h-time">${h.time}</span>
    </div>`;
  }).join('');
}

// ── INIT ──
startCamera();
</script>
</body>
</html>
